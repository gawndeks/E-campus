<link rel="stylesheet" href="assets/css/modern-custom-header.css">

<!-- Modern Industry-Level Header -->
<header class="modern-header" id="dynamic-header">
    <div class="h-container">
        <!-- Logo -->
        <a href="index.html" class="h-logo">
            <div class="h-logo-icon">eC</div>
            <span class="h-logo-text">eCampus</span>
        </a>

        <!-- Desktop Navigation Menu -->
        <nav class="h-nav" id="desktop-nav">
            <ul class="h-nav-list" id="h-nav-dynamic">
                <!-- Dynamically populated by JS based on role -->
                <li class="h-nav-item"><a href="#" class="h-nav-link active">Home</a></li>
                <li class="h-nav-item"><a href="#" class="h-nav-link">Courses</a></li>
                <li class="h-nav-item"><a href="#" class="h-nav-link">Assignments</a></li>
            </ul>
        </nav>

        <!-- Right Side: Interactions & Profile -->
        <div class="h-actions">

            <!-- Chat Icon -->
            <div class="h-action-item" id="chat-toggle">
                <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <span class="h-badge" id="chat-badge" style="display:none;">0</span>
            </div>

            <!-- Notification Bell -->
            <div class="h-action-item" id="notif-toggle">
                <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span class="h-badge pulse-anim" id="notif-badge" style="display:none;">0</span>

                <!-- Notification Dropdown -->
                <div class="h-dropdown notif-menu" id="notif-dropdown">
                    <div class="notif-header">
                        <h4>Notifications</h4>
                        <a href="#" id="mark-read-btn">Mark all read</a>
                    </div>
                    <ul class="notif-list" id="notif-list">
                        <li class="notif-empty">Loading notifications...</li>
                    </ul>
                </div>
            </div>

            <!-- User Profile Dropdown -->
            <div class="h-action-item h-profile" id="profile-toggle">
                <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="Profile"
                    class="h-avatar" id="header-avatar">
                <div class="h-profile-info">
                    <span class="h-user-name" id="h-user-name">Loading...</span>
                    <span class="h-user-role" id="h-user-role">Role</span>
                </div>
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                    class="h-caret">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>

                <div class="h-dropdown profile-menu" id="profile-dropdown">
                    <ul class="p-menu-list">
                        <li><a href="#"><svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg> My Profile</a></li>
                        <li><a href="#"><svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                    <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round" />
                                </svg> Settings</a></li>
                        <li class="divider"></li>
                        <li><a href="/logout" class="text-danger"><svg width="18" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg> Logout</a></li>
                    </ul>
                </div>
            </div>

            <!-- Hamburger (Mobile) -->
            <button class="h-hamburger" id="h-hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>

<!-- Chat Slide Panel -->
<div class="chat-panel" id="chat-panel">
    <div class="chat-header">
        <h4>Messages</h4>
        <button id="close-chat">&times;</button>
    </div>
    <div class="chat-body" id="chat-body">
        <div class="chat-empty">Fetching messages...</div>
    </div>
</div>
<div class="chat-overlay" id="chat-overlay"></div>

<script src="assets/js/modern-header.js"></script>
