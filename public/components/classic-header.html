<!-- Link the exclusive classic header CSS -->
<link rel="stylesheet" href="assets/css/classic-header.css">

<!-- Classic Site Header -->
<header class="classic-site-header" id="classic-header">
    <div class="classic-header-container">
        <!-- Logo -->
        <a href="index.html" class="ch-logo">
            <div class="ch-logo-square">eC</div>
            <div class="ch-logo-text">eCampus</div>
        </a>

        <!-- Desktop Navigation -->
        <nav class="ch-nav">
            <ul class="ch-nav-list" id="ch-nav-dynamic">
                <!-- Javascript maps links based on Guest/Student/Teacher here -->
                <li class="ch-nav-item"><a href="index.html" class="ch-nav-link active">Home</a></li>
                <li class="ch-nav-item"><a href="about.html" class="ch-nav-link">About</a></li>
                <li class="ch-nav-item"><a href="academics.html" class="ch-nav-link">Academics</a></li>
                <li class="ch-nav-item"><a href="admissions.html" class="ch-nav-link">Admissions</a></li>
            </ul>
        </nav>

        <!-- Right Side Blocks -->
        <div class="ch-right">

            <!-- Guest View (Not Logged In) -->
            <div id="ch-guest-view" style="display: none;">
                <a href="login.html" class="ch-btn-login">Login</a>
                <a href="admissions.html" class="ch-btn-register">Apply Now</a>
            </div>

            <!-- User View (Logged In) -->
            <div id="ch-user-view" style="display: flex;">

                <!-- Chat Notification Badge -->
                <a href="#" class="ch-notif" aria-label="Chats">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />
                    </svg>
                    <span class="ch-badge" id="ch-chat-badge" style="display:none;">0</span>
                </a>

                <!-- Alert Notification Badge -->
                <a href="#" class="ch-notif" aria-label="Alerts">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                    </svg>
                    <span class="ch-badge" id="ch-notif-badge" style="display:none;">0</span>
                </a>

                <!-- Profile Dropdown -->
                <div class="ch-profile" id="ch-profile-btn">
                    <img src="https://ui-avatars.com/api/?name=User&background=0F3A62&color=fff" alt="User Profile"
                        class="ch-avatar" id="ch-avatar">
                    <div class="ch-user-info" style="display: flex;">
                        <span class="ch-user-name" id="ch-user-name">Loading...</span>
                        <span class="ch-user-role" id="ch-user-role">Guest</span>
                    </div>

                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ch-text-light)"
                        stroke-width="2">
                        <path d="M6 9l6 6 6-6" />
                    </svg>

                    <!-- Dropdown List -->
                    <div class="ch-dropdown-menu" id="ch-profile-menu">
                        <ul class="ch-dropdown-list">
                            <li><a href="#">My Profile</a></li>
                            <li><a href="#">Account Settings</a></li>
                            <li><a href="/logout" style="color: #D32F2F; font-weight: 600;">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Mobile Hamburger -->
            <button class="ch-hamburger">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>

<script src="assets/js/classic-header.js"></script>
