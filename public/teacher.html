<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | eCampus</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/admin.css"> <!-- Reusing admin core layouts -->

    <style>
        :root {
            --teacher-primary: #1e40af;
            /* Unique teacher blue variant */
            --teacher-bg: #f8fafc;
        }

        .admin-sidebar {
            background-color: var(--teacher-primary);
        }

        .sidebar-brand {
            color: #fff;
        }

        .logo-icon {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="admin-body">

    <!-- Teacher Auth Secure Overlay -->
    <div id="teacher-login-overlay"
        style="position:fixed; inset:0; z-index:9999; background:var(--teacher-bg); display:flex; align-items:center; justify-content:center;">
        <div
            style="background:white; padding:3rem; border-radius:12px; max-width:400px; width:90%; box-shadow:0 15px 35px rgba(0,0,0,0.1); text-align:center;">
            <div
                style="background:var(--teacher-primary); color:white; width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:800; margin:0 auto 1.5rem;">
                👨‍🏫</div>
            <h2 style="font-family:'Outfit', sans-serif; color:var(--text-main); margin-bottom:0.5rem;">Instructor
                Portal</h2>
            <p style="color:var(--text-muted); margin-bottom:2rem;">Log in to access your classes</p>
            <form id="teacher-login-form">
                <input type="email" id="t-email" placeholder="Teacher Email (@ecampus.edu)" required
                    style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #e2e8f0; border-radius:6px; background:#f8fafc;">
                <input type="password" id="t-password" placeholder="Password" required
                    style="width:100%; padding:0.8rem; margin-bottom:1.5rem; border:1px solid #e2e8f0; border-radius:6px; background:#f8fafc;">
                <button type="submit"
                    style="width:100%; padding:0.9rem; background:var(--teacher-primary); color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-size:1rem; transition:0.3s;">Access
                    Dashboard</button>
            </form>
            <p id="t-login-error" style="color:#ef4444; margin-top:1rem; display:none; font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- App Wrapper -->
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-brand">
                    <div class="logo-icon">eC</div>
                    <span>Faculty Portal</span>
                </a>
            </div>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Teacher&background=ffffff&color=1e40af" id="t-avatar"
                    alt="Instructor Avatar">
                <div class="sidebar-user-info">
                    <h4 id="t-name-display" style="color:white;">Instructor</h4>
                    <p id="t-role-display" style="color:rgba(255,255,255,0.7);">Faculty</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-group">
                    <button class="nav-group-btn nav-item active" data-view="tview-dashboard">
                        <div class="group-content">📋 Dashboard Hub</div>
                    </button>
                </div>
                <!-- Classes -->
                <div class="nav-group">
                    <button class="nav-group-btn nav-item" data-view="tview-classes">
                        <div class="group-content">📚 My Assigned Classes</div>
                    </button>
                </div>
                <!-- Students -->
                <div class="nav-group">
                    <button class="nav-group-btn nav-item" data-view="tview-students">
                        <div class="group-content">👨‍🎓 Student Roster</div>
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="t-logout" class="btn-sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout System
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content" style="background:var(--teacher-bg); min-height:100vh;">

            <header class="admin-topbar"
                style="background:white; border-bottom:1px solid #e2e8f0; padding:1.5rem 2rem;">
                <h2 id="topbar-title" style="margin:0; font-family:'Outfit'; color:var(--text-main);">Dashboard Hub</h2>
            </header>

            <div class="admin-content-wrapper" style="padding:2rem;">

                <!-- 1. DASHBOARD VIEW -->
                <section id="tview-dashboard" class="admin-view active">
                    <div
                        style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
                        <div
                            style="background:white; padding:1.5rem; border-radius:12px; border-left:4px solid var(--primary); box-shadow:0 4px 6px rgba(0,0,0,0.05);">
                            <h4 style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.5rem;">Classes
                                Assigned</h4>
                            <div class="stat-number" id="stats-classes"
                                style="font-size:2rem; font-weight:800; color:var(--text-main);">0</div>
                        </div>
                        <div
                            style="background:white; padding:1.5rem; border-radius:12px; border-left:4px solid #10b981; box-shadow:0 4px 6px rgba(0,0,0,0.05);">
                            <h4 style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.5rem;">Total Students
                            </h4>
                            <div class="stat-number" id="stats-students"
                                style="font-size:2rem; font-weight:800; color:var(--text-main);">0</div>
                        </div>
                        <div
                            style="background:white; padding:1.5rem; border-radius:12px; border-left:4px solid #f59e0b; box-shadow:0 4px 6px rgba(0,0,0,0.05);">
                            <h4 style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.5rem;">Pending
                                Evaluation</h4>
                            <div class="stat-number" id="stats-evals"
                                style="font-size:2rem; font-weight:800; color:var(--text-main);">0</div>
                        </div>
                    </div>
                </section>

                <!-- 2. CLASSES VIEW -->
                <section id="tview-classes" class="admin-view">
                    <div
                        style="background:white; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.05); overflow:hidden;">
                        <table style="width:100%; text-align:left; border-collapse:collapse;">
                            <thead style="background:#f8fafc; border-bottom:1px solid #e2e8f0;">
                                <tr>
                                    <th style="padding:1rem;">Class</th>
                                    <th style="padding:1rem;">Subject</th>
                                    <th style="padding:1rem;">Code</th>
                                    <th style="padding:1rem;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="t-classes-body">
                                <tr>
                                    <td colspan="4" style="text-align:center; padding:2rem;">Fetching...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- 3. STUDENTS VIEW -->
                <section id="tview-students" class="admin-view">
                    <div
                        style="background:white; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.05); overflow:hidden;">
                        <table style="width:100%; text-align:left; border-collapse:collapse;">
                            <thead style="background:#f8fafc; border-bottom:1px solid #e2e8f0;">
                                <tr>
                                    <th style="padding:1rem;">Adm. No</th>
                                    <th style="padding:1rem;">Name</th>
                                    <th style="padding:1rem;">Gender</th>
                                    <th style="padding:1rem;">Class/Sec</th>
                                </tr>
                            </thead>
                            <tbody id="t-students-body">
                                <tr>
                                    <td colspan="4" style="text-align:center; padding:2rem;">Fetching...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Teacher Action Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const TToken = {
                get: () => localStorage.getItem('t_jwt'),
                set: (t) => localStorage.setItem('t_jwt', t),
                clear: () => { localStorage.removeItem('t_jwt'); localStorage.removeItem('t_data'); }
            };

            const overlay = document.getElementById('teacher-login-overlay');
            const form = document.getElementById('teacher-login-form');
            const errDom = document.getElementById('t-login-error');

            if (!TToken.get()) overlay.style.display = 'flex';
            else { overlay.style.display = 'none'; bootTeacherSystem(); }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('t-email').value;
                const password = document.getElementById('t-password').value;
                const btn = e.target.querySelector('button');
                btn.textContent = "Authenticating...";

                try {
                    const r = await fetch('/api/teacher/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const d = await r.json();

                    if (d.success) {
                        TToken.set(d.token);
                        localStorage.setItem('t_data', JSON.stringify(d.teacher));
                        overlay.style.display = 'none';
                        bootTeacherSystem();
                    } else {
                        errDom.textContent = d.message;
                        errDom.style.display = 'block';
                    }
                } catch (err) {
                    errDom.textContent = "Server configuration error.";
                    errDom.style.display = 'block';
                }
                btn.textContent = "Access Dashboard";
            });

            document.getElementById('t-logout').addEventListener('click', () => {
                TToken.clear(); window.location.reload();
            });

            async function tFetch(endpoint) {
                const res = await fetch(`/api/teacher${endpoint}`, { headers: { 'Authorization': 'Bearer ' + TToken.get() } });
                if (res.status === 401 || res.status === 403) { TToken.clear(); window.location.reload(); }
                return res.json();
            }

            function bootTeacherSystem() {
                const data = JSON.parse(localStorage.getItem('t_data'));
                if (data) {
                    document.getElementById('t-name-display').textContent = data.name;
                    document.getElementById('t-role-display').textContent = data.designation || 'Instructor';
                }
                switchTView('tview-dashboard');
            }

            // Simple SPA Switch logic
            document.querySelectorAll('.sidebar-nav .nav-group-btn').forEach(b => {
                b.addEventListener('click', e => {
                    document.querySelectorAll('.sidebar-nav .nav-group-btn').forEach(btn => btn.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    switchTView(e.currentTarget.getAttribute('data-view'));
                });
            });

            async function switchTView(viewId) {
                document.querySelectorAll('.admin-view').forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');

                if (viewId === 'tview-dashboard') {
                    const r = await tFetch('/dashboard');
                    if (r.success) {
                        document.getElementById('stats-classes').textContent = r.stats.total_classes;
                        document.getElementById('stats-students').textContent = r.stats.total_students;
                        document.getElementById('stats-evals').textContent = r.stats.evaluate_pending;
                    }
                }
                else if (viewId === 'tview-classes') {
                    const r = await tFetch('/classes');
                    const b = document.getElementById('t-classes-body');
                    if (r.success && r.data.length > 0) {
                        b.innerHTML = r.data.map(c => `<tr><td style="padding:1rem;"><strong>${c.class_name}</strong></td>
                            <td style="padding:1rem;color:var(--text-muted);">${c.subject_name}</td>
                            <td style="padding:1rem;"><span style="background:var(--bg-light);padding:2px 8px;border-radius:4px;">${c.code}</span></td>
                            <td style="padding:1rem;"><button style="padding:6px 12px;background:var(--teacher-primary);color:white;border:none;border-radius:4px;cursor:pointer;">Manage</button></td></tr>`).join('');
                    } else b.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;">No classes assigned.</td></tr>`;
                }
                else if (viewId === 'tview-students') {
                    const r = await tFetch('/students');
                    const b = document.getElementById('t-students-body');
                    if (r.success && r.data.length > 0) {
                        b.innerHTML = r.data.map(s => `<tr><td style="padding:1rem;">${s.admission_no}</td>
                            <td style="padding:1rem;font-weight:600;">${s.name}</td>
                            <td style="padding:1rem;">${s.gender}</td>
                            <td style="padding:1rem;">${s.class_name} - ${s.section_name}</td></tr>`).join('');
                    } else b.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;">No students assigned.</td></tr>`;
                }
            }
        });
    </script>
</body>

</html>
