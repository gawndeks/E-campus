<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam | eCampus Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body>
    <div class="card" style="max-width: 800px; margin: 0 auto;">
        <div class="card-header">
            <h3 class="card-title">Create / Schedule Examination</h3>
            <a href="/admin/exams/list.html" class="btn btn-outline btn-sm">Cancel</a>
        </div>

        <div style="padding: 30px;">
            <form id="addExamForm"
                onsubmit="event.preventDefault(); window.showToast('Exam Schedule Created!','success'); setTimeout(()=>window.location.href='/admin/exams/list.html',1000);">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Exam Title *</label>
                        <input type="text" class="form-control" placeholder="e.g. Final Semester 2026" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Start Date *</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">End Date *</label>
                        <input type="date" class="form-control" required>
                    </div>
                </div>

                <h4
                    style="margin: 20px 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary);">
                    Target Classes & Subjects</h4>

                <div class="form-group">
                    <label class="form-label">Select Classes (Hold Ctrl to select multiple)</label>
                    <select multiple class="form-control" style="height: 100px;" required>
                        <option value="10">Class 10th</option>
                        <option value="9">Class 9th</option>
                        <option value="8">Class 8th</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Total Marks (Per Subject) *</label>
                        <input type="number" class="form-control" value="100" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Passing Marks *</label>
                        <input type="number" class="form-control" value="33" required>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 15px;">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Create Exam Framework</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/admin/js/admin-core.js"></script>
</body>

</html>
