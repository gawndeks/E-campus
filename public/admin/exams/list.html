<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams List | eCampus Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Exam Management</h3>
            <div class="action-btns">
                <a href="/admin/exams/create.html" class="btn btn-primary"><span>+</span> Create New Exam</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Exam Term Name</th>
                        <th>Target Classes</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: 500;">Half Yearly Examination 2026</td>
                        <td>9th, 10th</td>
                        <td>Oct 10, 2026</td>
                        <td>Oct 24, 2026</td>
                        <td><span class="status status-active">Scheduled</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-sm btn-outline">Edit</button>
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="font-weight: 500;">First Term Unit Test</td>
                        <td>10th</td>
                        <td>Aug 05, 2026</td>
                        <td>Aug 10, 2026</td>
                        <td><span class="status status-inactive"
                                style="background:#e2e8f0; color:#475569;">Completed</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-sm btn-outline" disabled style="opacity:0.5;">Edit</button>
                                <button class="btn btn-sm btn-danger" disabled style="opacity:0.5;">Delete</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/admin/js/admin-core.js"></script>
</body>

</html>
