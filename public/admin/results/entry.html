<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Entry | eCampus Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Subject-wise Marks Entry</h3>
            <div class="action-btns">
                <button class="btn btn-primary"
                    onclick="window.showToast('Marks Saved! Grading Auto-calculated!', 'success')">Save Marks</button>
            </div>
        </div>

        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); background: var(--bg-surface); display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end;">
            <div class="form-group" style="margin: 0; min-width: 200px;">
                <label class="form-label" style="font-size: 0.8rem; margin-bottom: 5px;">Select Exam</label>
                <select class="form-control">
                    <option value="">Choose Exam</option>
                    <option value="HY26" selected>Half Yearly Examination 2026</option>
                </select>
            </div>
            <div class="form-group" style="margin: 0;">
                <label class="form-label" style="font-size: 0.8rem; margin-bottom: 5px;">Class</label>
                <select class="form-control" style="width: auto;">
                    <option value="10">Class 10th</option>
                </select>
            </div>
            <div class="form-group" style="margin: 0;">
                <label class="form-label" style="font-size: 0.8rem; margin-bottom: 5px;">Subject</label>
                <select class="form-control" style="width: auto;">
                    <option value="mat">Mathematics</option>
                    <option value="sci">Science</option>
                </select>
            </div>
            <button class="btn btn-outline" onclick="window.showToast('Student list loaded')">Load Students</button>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Roll No</th>
                        <th>Student Name</th>
                        <th>Student ID</th>
                        <th style="width:150px;">Marks Obtained</th>
                        <th style="width:150px;">Max Marks</th>
                        <th>Auto Grade</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: 600;">1</td>
                        <td style="font-weight: 500;">John Doe</td>
                        <td style="font-family: monospace; color: var(--text-muted);">ST2026-101</td>
                        <td>
                            <input type="number" class="form-control" value="85"
                                style="width: 100px; padding: 5px 10px;">
                        </td>
                        <td>100</td>
                        <td><span class="status status-active"
                                style="background:#dcfce7; color:#166534; font-size:0.9rem;">A (Pass)</span></td>
                    </tr>
                    <tr>
                        <td style="font-weight: 600;">2</td>
                        <td style="font-weight: 500;">Jane Smith</td>
                        <td style="font-family: monospace; color: var(--text-muted);">ST2026-102</td>
                        <td>
                            <input type="number" class="form-control" value="28"
                                style="width: 100px; padding: 5px 10px;">
                        </td>
                        <td>100</td>
                        <td><span class="status status-inactive" style="font-size:0.9rem;">F (Fail)</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="/admin/js/admin-core.js"></script>
</body>

</html>
