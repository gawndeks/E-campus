<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users | eCampus System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">System Administrators & Roles</h3>
            <div class="action-btns">
                <button class="btn btn-primary"
                    onclick="window.showToast('Invite Admin Modal Triggered')"><span>+</span> Invite
                    Staff/Admin</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Admin Name</th>
                        <th>Email Key</th>
                        <th>Security Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: 500;">Prashant Verma</td>
                        <td style="color: var(--text-muted);">founder@ecampus.edu</td>
                        <td><span class="status" style="background:var(--primary); color:#fff;">Super Admin</span></td>
                        <td><span class="status status-active">Active</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-sm btn-outline" disabled style="opacity:0.5;">Manage
                                    Permissions</button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="font-weight: 500;">John Clerk</td>
                        <td style="color: var(--text-muted);">desk@ecampus.edu</td>
                        <td><span class="status" style="background:#e2e8f0; color:#475569;">Receptionist / Data
                                Entry</span></td>
                        <td><span class="status status-active">Active</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-sm btn-outline">Manage Permissions</button>
                                <button class="btn btn-sm btn-danger">Revoke</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="/admin/js/admin-core.js"></script>
</body>

</html>
