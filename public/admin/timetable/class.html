<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Timetable | eCampus Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Class Schedule Tracker</h3>
            <div class="action-btns">
                <button class="btn btn-primary" onclick="window.showToast('Class schedule saved!', 'success')">Save
                    Routine</button>
            </div>
        </div>

        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px;">
            <select class="form-control" style="max-width: 250px;">
                <option value="">Filter by Class...</option>
                <option value="10">Class 10th - A</option>
            </select>
            <button class="btn btn-outline" onclick="window.showToast('Schedule loaded')">Load Target</button>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Period</th>
                        <th>Time</th>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: 600;">1</td>
                        <td>08:00 AM - 08:45 AM</td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>Maths - A. Sharma</option>
                            </select></td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>Science - P. Iyer</option>
                            </select></td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>English - R. Verma</option>
                            </select></td>
                    </tr>
                    <tr>
                        <td style="font-weight: 600;">2</td>
                        <td>08:45 AM - 09:30 AM</td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>Science - P. Iyer</option>
                            </select></td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>Maths - A. Sharma</option>
                            </select></td>
                        <td><select class="form-control" style="font-size: 0.8rem;">
                                <option>PT - Coach</option>
                            </select></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="/admin/js/admin-core.js"></script>
</body>

</html>
