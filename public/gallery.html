<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCampus | Campus Gallery</title>
    <!-- Core Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- Core CSS Shared -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Custom CSS for specific gallery structure -->
    <link rel="stylesheet" href="assets/css/gallery.css">
</head>

<body class="bg-light">

    <!-- Injection Point for the Global Classic Header -->
    <!-- Classic Site Header -->
    <link rel="stylesheet" href="assets/css/classic-header.css">
    <header class="classic-site-header" id="classic-header">
        <div class="classic-header-container">
            <!-- Logo -->
            <a href="index.html" class="ch-logo">
                <div class="ch-logo-square">eC</div>
                <div class="ch-logo-text">eCampus</div>
            </a>
            <!-- Desktop Navigation -->
            <nav class="ch-nav">
                <ul class="ch-nav-list" id="ch-nav-dynamic">
                    <!-- Javascript automatically mounts the right links based on Guest/Student/Teacher -->
                </ul>
            </nav>
            <!-- Right Side Blocks -->
            <div class="ch-right">
                <div id="ch-guest-view" style="display: none;">
                    <a href="login.html" class="ch-btn-login">Login</a>
                    <a href="admissions.html" class="ch-btn-register">Apply Now</a>
                </div>
                <!-- User View (Logged In) -->
                <div id="ch-user-view" style="display: none;">
                    <!-- Chat Badge -->
                    <a href="#" class="ch-notif" aria-label="Chats">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />
                        </svg>
                        <span class="ch-badge" id="ch-chat-badge" style="display:none;">0</span>
                    </a>
                    <!-- Alert Badge -->
                    <a href="#" class="ch-notif" aria-label="Alerts">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                        </svg>
                        <span class="ch-badge" id="ch-notif-badge" style="display:none;">0</span>
                    </a>
                    <!-- Profile Trigger -->
                    <div class="ch-profile" id="ch-profile-btn">
                        <img src="https://ui-avatars.com/api/?name=User&background=0F3A62&color=fff" alt="User Profile"
                            class="ch-avatar" id="ch-avatar">
                        <div class="ch-user-info" style="display: flex;">
                            <span class="ch-user-name" id="ch-user-name">Loading...</span>
                            <span class="ch-user-role" id="ch-user-role">Guest</span>
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ch-text-light)"
                            stroke-width="2">
                            <path d="M6 9l6 6 6-6" />
                        </svg>
                        <div class="ch-dropdown-menu" id="ch-profile-menu">
                            <ul class="ch-dropdown-list">
                                <li><a href="#">My Profile</a></li>
                                <li><a href="#">Account Settings</a></li>
                                <li><a href="/logout" style="color: #D32F2F; font-weight: 600;">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <!-- Mobile Hamburger -->
                <button class="ch-hamburger">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Header Hero -->
    <div class="gallery-hero">
        <div class="container gallery-hero-content">
            <h1 class="gallery-headline">Campus Gallery</h1>
            <p class="gallery-subheadline">A visual journey mapping life, learning, and success at eCampus.</p>
        </div>
    </div>

    <!-- Gallery Primary Layout Layer -->
    <section class="container" style="padding: 3rem 1.5rem 5rem;">

        <!-- Controls: Filters & Upload -->
        <div class="gallery-controls">
            <!-- Filter Nav -->
            <ul class="gallery-filters" id="gallery-filters">
                <li><button class="filter-btn active" data-filter="All">All</button></li>
                <li><button class="filter-btn" data-filter="Events">Events</button></li>
                <li><button class="filter-btn" data-filter="Campus">Campus</button></li>
                <li><button class="filter-btn" data-filter="Sports">Sports</button></li>
                <li><button class="filter-btn" data-filter="Classrooms">Classrooms</button></li>
                <li><button class="filter-btn" data-filter="Cultural Activities">Cultural Activities</button></li>
            </ul>

            <!-- Dynamic Upload Wrapper -->
            <div id="gallery-admin-controls" style="display:none;">
                <button class="btn btn-primary" id="open-upload-modal">
                    + Upload Photo
                </button>
            </div>
        </div>

        <!-- Render Target for Grid -->
        <div class="gallery-grid" id="gallery-grid">
            <!-- Javascript binds dynamic cards here instantly -->
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: #64748b;">
                Fetching vibrant moments...
            </div>
        </div>
    </section>

    <!-- Upload Modal -->
    <div class="gallery-modal-overlay" id="upload-modal-overlay">
        <div class="gallery-modal-content">
            <div class="gallery-modal-header">
                <h3>Upload New Memory</h3>
                <button id="close-upload-modal" class="gallery-modal-close">&times;</button>
            </div>
            <div class="gallery-modal-body">
                <form id="gallery-upload-form">
                    <div style="margin-bottom: 1rem;">
                        <label>Photo Title</label>
                        <input type="text" id="upload-title" class="form-control" required
                            placeholder="Ex: Inter-School Debate finals">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label>Category</label>
                        <select id="upload-category" class="form-control" required>
                            <option value="Events">Events</option>
                            <option value="Campus">Campus</option>
                            <option value="Sports">Sports</option>
                            <option value="Classrooms">Classrooms</option>
                            <option value="Cultural Activities">Cultural Activities</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label>Image File (JPEG/PNG)</label>
                        <input type="file" id="upload-file" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Post to Gallery</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Lightbox Zoom Viewer -->
    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img src="" alt="Fullscreen Gallery Image" id="lightbox-img" class="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption">Title defaults here</div>
    </div>

    <!-- Root Javascript Dependencies -->
    <!-- Loads core user session mappings for active navbar highlighting instantly -->
    <script src="assets/js/classic-header.js"></script>
    <!-- Isolated module specific to firing frontend UI gallery pulls & events -->
    <script src="assets/js/gallery.js"></script>

</body>

</html>
